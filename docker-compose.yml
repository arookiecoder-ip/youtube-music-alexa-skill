services:
  ytmusic:
    build: ./flask-server
    container_name: ytmusic
    restart: unless-stopped
    env_file: .env
    environment:
      # Listen history and playlists must outlive the container; /tmp is ephemeral.
      - DB_FILE=/data/data.db
    volumes:
      - ~/cookies.txt:/app/cookies.txt:ro
      - ytmusic_cache:/tmp/ytm_audio_cache
      - ytmusic_data:/data
    networks:
      - web

  caddy:
    image: caddy:2
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web

networks:
  web:
    name: web

volumes:
  ytmusic_cache:
  ytmusic_data:
  caddy_data:
  caddy_config:
